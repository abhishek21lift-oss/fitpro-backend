services:
  - type: web
    name: fitai-coach-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        value: fitpro-jwt-secret-2026
      - key: FRONTEND_URL
        value: https://fitai-coach.vercel.app
